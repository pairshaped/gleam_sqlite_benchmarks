name: test

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          gleam-version: "1.17.0"
          rebar3-version: "3"
          # elixir-version: "1"
      - run: gleam deps download
        working-directory: gleam
      - run: gleam test
        working-directory: gleam
      - run: gleam format --check src test
        working-directory: gleam
